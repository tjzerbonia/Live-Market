<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forecast Markets</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Nickname modal -->
  <div id="nickname-overlay" class="overlay hidden">
    <div class="modal">
      <div class="modal-logo">
        <img src="kalshi_800.png" alt="Kalshi" />
      </div>
      <h2>Welcome to Forecast</h2>
      <p>Pick a display name to start trading. No account needed.</p>
      <input type="text" id="nickname-input" placeholder="Your display name" maxlength="24" autocomplete="off" />
      <div id="nickname-error" class="nickname-error hidden"></div>
      <button id="nickname-submit">Enter Markets</button>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <img src="kalshi_800.png" alt="Kalshi" />
      </div>
      <div class="header-right">
        <div class="balance-pill">
          <span class="balance-label">Balance</span>
          <span class="balance-amount" id="user-balance">$1,000</span>
        </div>
        <div class="user-pill" id="user-display">
          <span id="user-name-display">—</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main>
    <div class="page-header">
      <div>
        <h1>Markets</h1>
        <p class="subtitle">Real-money feel, no real stakes. Trade your free balance.</p>
      </div>
      <div class="live-badge">
        <span class="live-dot"></span> Live
      </div>
    </div>

    <div class="markets-grid" id="markets-grid">
      <!-- Markets injected by JS -->
    </div>

    <section class="activity-section">
      <h2>Recent Trades</h2>
      <div class="activity-feed" id="activity-feed">
        <div class="activity-empty">No trades yet. Be the first!</div>
      </div>
    </section>
  </main>

  <!-- Bet modal -->
  <div id="bet-overlay" class="overlay hidden">
    <div class="modal bet-modal">
      <button class="modal-close" id="bet-close">&#x2715;</button>
      <div class="bet-modal-category" id="bet-modal-category"></div>
      <div class="bet-modal-market" id="bet-modal-market-title"></div>
      <div class="modal-chart-area" id="modal-chart-area"></div>
      <div class="bet-options-row" id="bet-options-row">
        <!-- Populated by JS -->
      </div>
      <div class="bet-odds-display" id="bet-odds-display"></div>
      <div class="bet-amount-row">
        <label>Amount</label>
        <div class="amount-controls">
          <button id="amount-dec">-</button>
          <input type="number" id="bet-amount-input" min="1" value="10" oninput="onAmountInput(this.value)" />
          <button id="amount-inc">+</button>
        </div>
        <div class="quick-amounts" id="quick-amounts">
          <button data-amt="10">$10</button>
          <button data-amt="25">$25</button>
          <button data-amt="50">$50</button>
          <button data-amt="100">$100</button>
          <button data-amt="250">$250</button>
        </div>
        <div class="step-row">
          <label>Step</label>
          <div class="step-btns">
            <button data-step="1" id="step-1">$1</button>
            <button data-step="5" id="step-5">$5</button>
            <button data-step="10" id="step-10" class="active">$10</button>
            <button data-step="25" id="step-25">$25</button>
            <button data-step="50" id="step-50">$50</button>
          </div>
        </div>
      </div>
      <div class="bet-payout-row">
        <span>Potential payout</span>
        <span class="payout-amount" id="payout-amount">$19</span>
      </div>
      <button class="submit-bet-btn" id="submit-bet-btn" onclick="submitBet()">Place Trade</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
