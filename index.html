<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forecast Markets</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Nickname modal -->
  <div id="nickname-overlay" class="overlay hidden">
    <div class="modal">
      <div class="modal-logo">
        <img src="kalshi_800.png" alt="Kalshi" />
      </div>
      <h2>The Schmeckle Market</h2>
      <p>Pick a name. Every trader starts with 1,000 Schmeckles. Don't blow it.</p>
      <input type="text" id="nickname-input" placeholder="Your display name" maxlength="24" autocomplete="off" />
      <div class="avatar-upload-row">
        <div class="avatar-preview" id="avatar-preview"></div>
        <label class="avatar-upload-btn" for="avatar-file-input">Add a photo <span class="avatar-optional">(optional)</span></label>
        <input type="file" id="avatar-file-input" accept="image/*" style="display:none" />
      </div>
      <div id="nickname-error" class="nickname-error hidden"></div>
      <button id="nickname-submit">Enter Markets</button>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <img src="kalshi_800.png" alt="Kalshi" />
      </div>
      <div class="header-right">
        <div class="balance-pill" id="balance-pill" onclick="openHistory()" title="View trade history">
          <span class="balance-label">Balance</span>
          <span class="balance-amount" id="user-balance">$1,000</span>
        </div>
<div class="user-pill" id="user-display" onclick="openAvatarModal()" title="Update photo">
          <div class="user-avatar" id="user-avatar"></div>
          <span id="user-name-display">—</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main>
    <div class="page-header">
      <div>
        <h1>Markets</h1>
        <p class="subtitle">Trade your Schmeckles today.</p>
      </div>
      <div class="live-badge">
        <span class="live-dot"></span> Live
      </div>
    </div>

    <div class="page-tab-row">
      <button class="page-tab active" data-tab="markets" onclick="setPageTab('markets')">Markets</button>
      <button class="page-tab" data-tab="leaderboard" onclick="setPageTab('leaderboard')">Leaderboard</button>
    </div>

    <!-- Markets tab -->
    <div id="tab-markets">
      <div class="market-filter-row">
        <button class="market-filter-btn" data-filter="all" onclick="setMarketFilter('all')">All</button>
        <button class="market-filter-btn active" data-filter="open" onclick="setMarketFilter('open')">Open</button>
        <button class="market-filter-btn" data-filter="resolved" onclick="setMarketFilter('resolved')">Resolved</button>
      </div>

      <div class="category-filter-row" id="category-filter-row" style="display:none">
        <!-- injected by JS -->
      </div>

      <div class="markets-grid" id="markets-grid">
        <!-- Markets injected by JS -->
      </div>

      <section class="activity-section">
        <h2>Recent Trades</h2>
        <div class="activity-feed" id="activity-feed">
          <div class="activity-empty">No trades yet. Be the first!</div>
        </div>
      </section>
    </div>

    <!-- Leaderboard tab -->
    <div id="tab-leaderboard" style="display:none">
      <div class="leaderboard-list" id="leaderboard-list"></div>
    </div>
  </main>

  <!-- History panel -->
  <div id="history-overlay" class="overlay hidden" onclick="if(event.target===this)closeHistory()">
    <div class="history-panel">
      <div class="history-header">
        <div>
          <div class="history-title">Your Trades</div>
          <div class="history-subtitle" id="history-subtitle"></div>
        </div>
        <button class="modal-close" onclick="closeHistory()">&#x2715;</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty">Loading...</div>
      </div>
    </div>
  </div>

<!-- Bet modal -->
  <div id="bet-overlay" class="overlay hidden">
    <div class="modal bet-modal">
      <button class="modal-close" id="bet-close">&#x2715;</button>
      <div class="bet-modal-category" id="bet-modal-category"></div>
      <div class="bet-modal-market" id="bet-modal-market-title"></div>
      <div class="bet-modal-close-date" id="bet-modal-close-date"></div>
      <div id="modal-winner-banner" class="hidden"></div>
      <div class="modal-chart-area" id="modal-chart-area"></div>
      <div class="bet-options-row" id="bet-options-row">
        <!-- Populated by JS -->
      </div>
      <div class="bet-amount-row" id="bet-amount-row">
        <div class="bet-input-wrap">
          <span class="bet-input-dollar">$</span>
          <input type="number" id="bet-amount-input" min="1" placeholder="Enter amount" autocomplete="off" />
        </div>
        <div class="bet-input-hint" id="bet-input-hint"></div>
      </div>
      <div class="bet-summary" id="bet-summary"></div>
      <button class="submit-bet-btn" id="submit-bet-btn" onclick="submitBet()">Place Trade</button>
    </div>
  </div>

  <!-- Avatar update modal -->
  <div id="avatar-modal-overlay" class="overlay hidden" onclick="if(event.target===this)closeAvatarModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeAvatarModal()">&#x2715;</button>
      <h2>Update Photo</h2>
      <p>Choose a new profile picture.</p>
      <div class="avatar-upload-row">
        <div class="avatar-preview" id="avatar-modal-preview"></div>
        <label class="avatar-upload-btn" for="avatar-update-input">Choose photo</label>
        <input type="file" id="avatar-update-input" accept="image/*" style="display:none" />
      </div>
      <button id="avatar-modal-save" disabled>Save Photo</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
